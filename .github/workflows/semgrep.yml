name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bootstrap CI dependencies
        run: CI_SETUP_PROFILE=base,semgrep make ci-setup

      - name: Run targeted Semgrep checks
        run: ./scripts/run-security-checks.sh
