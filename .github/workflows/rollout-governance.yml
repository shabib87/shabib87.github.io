name: Rollout Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rollout-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

      - name: Bootstrap CI dependencies
        run: CI_SETUP_PROFILE=base make ci-setup

      - name: Run rollout governance checks
        run: ./scripts/run-workflow-checks.sh
